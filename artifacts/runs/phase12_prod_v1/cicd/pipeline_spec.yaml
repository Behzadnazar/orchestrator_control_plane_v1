name: phase12-governed-prod-pipeline
trigger:
  - main
stages:
  - dev
  - test
  - staging
  - prod
release_gates:
  pre_prod_checks:
    - integration
    - security_scan
  prod_checks:
    - manual_approval
    - signed_sbom
    - provenance_attestation
    - observability_validation
promotion_flow: dev -> test -> staging -> prod
