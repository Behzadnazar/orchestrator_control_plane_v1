[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = *Tests
python_functions = test_*
addopts = -ra -q --strict-markers --strict-config
junit_family = xunit2
markers =
    smoke: fast control-plane smoke checks
    e2e: end-to-end workflow regression checks
    regression: formal regression and negative matrix checks
